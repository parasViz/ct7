<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc">
  <title id="title">Fruit equation challenge</title>
  <desc id="desc">Three clues show orange plus pear equals 17, pear plus strawberry equals 14, and orange plus strawberry equals 13. The final question asks for pear plus pear minus strawberry.</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#172034" flood-opacity="0.09"/>
    </filter>
    <linearGradient id="findBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3fffb"/>
      <stop offset="1" stop-color="#fff8e9"/>
    </linearGradient>
    <symbol id="orange" viewBox="0 0 92 92">
      <circle cx="45" cy="52" r="31" fill="#ff8a12" stroke="#172034" stroke-width="4"/>
      <path d="M45 21 C52 10 61 8 67 8" fill="none" stroke="#172034" stroke-width="5" stroke-linecap="round"/>
      <path d="M46 25 C60 12 76 13 85 23 C69 31 56 32 46 25Z" fill="#16b35d" stroke="#172034" stroke-width="4" stroke-linejoin="round"/>
      <path d="M27 34 C18 52 25 73 46 78" fill="none" stroke="#ffd08a" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    </symbol>
    <symbol id="pear" viewBox="0 0 92 104">
      <path d="M48 19 C59 22 68 37 66 52 C80 72 66 97 44 98 C21 99 10 75 24 53 C20 37 31 20 48 19Z" fill="#67b90b" stroke="#172034" stroke-width="4" stroke-linejoin="round"/>
      <path d="M48 20 C49 8 56 5 64 5" fill="none" stroke="#172034" stroke-width="5" stroke-linecap="round"/>
      <path d="M50 22 C62 11 78 14 84 27 C69 29 58 29 50 22Z" fill="#16b35d" stroke="#172034" stroke-width="4" stroke-linejoin="round"/>
      <path d="M28 49 C21 66 28 86 45 91" fill="none" stroke="#b9ee62" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    </symbol>
    <symbol id="strawberry" viewBox="0 0 88 92">
      <path d="M44 21 C66 20 78 35 75 53 C72 70 55 86 44 89 C33 86 16 70 13 53 C10 35 22 20 44 21Z" fill="#f95858" stroke="#172034" stroke-width="4" stroke-linejoin="round"/>
      <path d="M25 24 L36 17 L44 24 L54 17 L63 24 L56 31 L45 28 L34 31Z" fill="#59aa2c" stroke="#172034" stroke-width="4" stroke-linejoin="round"/>
      <g fill="#172034">
        <ellipse cx="33" cy="44" rx="3" ry="5"/>
        <ellipse cx="49" cy="44" rx="3" ry="5"/>
        <ellipse cx="61" cy="55" rx="3" ry="5"/>
        <ellipse cx="28" cy="59" rx="3" ry="5"/>
        <ellipse cx="45" cy="64" rx="3" ry="5"/>
      </g>
    </symbol>
  </defs>

  <rect width="720" height="440" rx="28" fill="#f7f8fb"/>
  <rect x="24" y="22" width="672" height="396" rx="24" fill="#ffffff" stroke="#eaeef5" stroke-width="1.5" filter="url(#cardShadow)"/>

  <g font-family="Roboto, Segoe UI, Arial, sans-serif" font-weight="900" fill="#172034">
    <text x="54" y="64" font-size="18" font-weight="700" fill="#7a8699" letter-spacing="1">USE THE CLUES</text>
    <text x="575" y="64" text-anchor="middle" font-size="18" font-weight="700" fill="#7a8699" letter-spacing="1">FIND</text>

    <g transform="translate(46 86)">
      <rect width="424" height="80" rx="18" fill="#fafbfd"/>
      <use href="#orange" x="36" y="9" width="60" height="60"/>
      <text x="140" y="55" font-size="38" fill="#9aa4b6">+</text>
      <use href="#pear" x="188" y="2" width="60" height="70"/>
      <text x="284" y="55" font-size="38" fill="#9aa4b6">=</text>
      <rect x="332" y="20" width="78" height="48" rx="12" fill="#fff7e3" stroke="#ffd166" stroke-width="1.5"/>
      <text x="371" y="55" text-anchor="middle" font-size="34">17</text>
    </g>

    <g transform="translate(46 188)">
      <rect width="424" height="80" rx="18" fill="#fafbfd"/>
      <use href="#pear" x="36" y="2" width="60" height="70"/>
      <text x="140" y="55" font-size="38" fill="#9aa4b6">+</text>
      <use href="#strawberry" x="190" y="7" width="58" height="62"/>
      <text x="284" y="55" font-size="38" fill="#9aa4b6">=</text>
      <rect x="332" y="20" width="78" height="48" rx="12" fill="#fff1f4" stroke="#f95877" stroke-width="1.5"/>
      <text x="371" y="55" text-anchor="middle" font-size="34">14</text>
    </g>

    <g transform="translate(46 290)">
      <rect width="424" height="80" rx="18" fill="#fafbfd"/>
      <use href="#orange" x="36" y="9" width="60" height="60"/>
      <text x="140" y="55" font-size="38" fill="#9aa4b6">+</text>
      <use href="#strawberry" x="190" y="7" width="58" height="62"/>
      <text x="284" y="55" font-size="38" fill="#9aa4b6">=</text>
      <rect x="332" y="20" width="78" height="48" rx="12" fill="#ecfbf4" stroke="#06d6a0" stroke-width="1.5"/>
      <text x="371" y="55" text-anchor="middle" font-size="34">13</text>
    </g>

    <g transform="translate(492 82)">
      <rect width="166" height="306" rx="22" fill="url(#findBg)" stroke="#e3ebf3" stroke-width="1.5"/>

      <use href="#pear" x="20" y="30" width="50" height="58"/>
      <text x="83" y="71" text-anchor="middle" font-size="28" fill="#647086">+</text>
      <use href="#pear" x="96" y="30" width="50" height="58"/>

      <text x="83" y="142" text-anchor="middle" font-size="30" fill="#647086">−</text>

      <use href="#strawberry" x="54" y="162" width="58" height="62"/>

      <path d="M40 254 H126" stroke="#cfd6e2" stroke-width="2" stroke-linecap="round"/>
      <text x="83" y="290" text-anchor="middle" font-size="48" font-weight="900" fill="#f95877">?</text>
    </g>
  </g>
</svg>
