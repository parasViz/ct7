<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Prime number digital safe keypad</title>
  <desc id="desc">A clean digital safe with a four by four grid of the first sixteen prime numbers, arranged randomly.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f8fb"/>
    </linearGradient>
    <linearGradient id="display" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172034"/>
      <stop offset="1" stop-color="#1f2c47"/>
    </linearGradient>
    <linearGradient id="pinkPill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f95877"/>
      <stop offset="1" stop-color="#ef7140"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f9fbff"/>
    </linearGradient>
    <filter id="cardShadow" x="-6%" y="-6%" width="112%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#172034" flood-opacity="0.1"/>
    </filter>
    <filter id="tileShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#172034" flood-opacity="0.07"/>
    </filter>
    <symbol id="primeTile" viewBox="0 0 64 64">
      <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="14" fill="url(#tile)" stroke="#e5e8ef" stroke-width="1.5"/>
    </symbol>
  </defs>

  <rect width="640" height="440" rx="20" fill="url(#shell)"/>
  <rect x="20" y="18" width="600" height="404" rx="18" fill="#ffffff" stroke="#e5e8ef" stroke-width="1.5" filter="url(#cardShadow)"/>

  <g transform="translate(46 38)">
    <rect width="548" height="56" rx="14" fill="url(#display)"/>
    <text x="26" y="36" fill="#ffffff" font-family="Roboto, Segoe UI, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="0.4">PRIME SAFE</text>
    <g transform="translate(382 12)">
      <rect width="148" height="32" rx="16" fill="url(#pinkPill)"/>
      <text x="74" y="22" fill="#ffffff" font-family="Roboto, Segoe UI, Arial, sans-serif" font-size="12" font-weight="900" text-anchor="middle" letter-spacing="0.8">MULTIPLY ALL</text>
    </g>
  </g>

  <g transform="translate(171 116)" font-family="Roboto, Segoe UI, Arial, sans-serif" font-weight="900" text-anchor="middle">
    <!-- Row 1: 37, 5, 23, 13 -->
    <g>
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">37</text>
    </g>
    <g transform="translate(78 0)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">5</text>
    </g>
    <g transform="translate(156 0)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">23</text>
    </g>
    <g transform="translate(234 0)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">13</text>
    </g>

    <!-- Row 2: 2, 43, 17, 29 -->
    <g transform="translate(0 78)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">2</text>
    </g>
    <g transform="translate(78 78)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">43</text>
    </g>
    <g transform="translate(156 78)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">17</text>
    </g>
    <g transform="translate(234 78)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">29</text>
    </g>

    <!-- Row 3: 11, 47, 7, 31 -->
    <g transform="translate(0 156)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">11</text>
    </g>
    <g transform="translate(78 156)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">47</text>
    </g>
    <g transform="translate(156 156)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">7</text>
    </g>
    <g transform="translate(234 156)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">31</text>
    </g>

    <!-- Row 4: 41, 3, 19, 53 -->
    <g transform="translate(0 234)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">41</text>
    </g>
    <g transform="translate(78 234)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">3</text>
    </g>
    <g transform="translate(156 234)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">19</text>
    </g>
    <g transform="translate(234 234)">
      <use href="#primeTile" width="64" height="64" filter="url(#tileShadow)"/>
      <text x="32" y="41" fill="#172034" font-size="22">53</text>
    </g>
  </g>
</svg>
