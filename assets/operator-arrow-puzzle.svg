<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Operator arrow puzzle</title>
  <desc id="desc">Four arrows labeled P, Q, R, and S point to a centre box. Each arrow has an operator and an equation to test.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1fffb"/>
      <stop offset="0.55" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#fff7df"/>
    </linearGradient>
    <linearGradient id="centerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14213d"/>
      <stop offset="1" stop-color="#253a68"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#172034" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#172034" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="720" height="420" rx="28" fill="url(#pageBg)"/>
  <rect x="32" y="28" width="656" height="364" rx="24" fill="#ffffff" stroke="#dfe8f4" stroke-width="2" filter="url(#softShadow)"/>

  <g font-family="Roboto, Segoe UI, Arial, sans-serif">
    <text x="360" y="64" text-anchor="middle" fill="#647086" font-size="14" font-weight="900" letter-spacing="1.6">CHOOSE THE TRUE ARROW</text>

    <g filter="url(#cardShadow)">
      <rect x="60" y="88" width="198" height="86" rx="16" fill="#f8fbff" stroke="#118ab2" stroke-width="3"/>
      <text x="84" y="120" fill="#118ab2" font-size="13" font-weight="900">ARROW P</text>
      <rect x="208" y="104" width="34" height="34" rx="10" fill="#e7f7ff"/>
      <text x="225" y="129" text-anchor="middle" fill="#172034" font-size="27" font-weight="900">+</text>
      <text x="159" y="153" text-anchor="middle" fill="#172034" font-size="20" font-weight="900">15 @ 5 = 3</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="462" y="88" width="198" height="86" rx="16" fill="#f1fffb" stroke="#06d6a0" stroke-width="3"/>
      <text x="486" y="120" fill="#00775a" font-size="13" font-weight="900">ARROW Q</text>
      <rect x="610" y="104" width="34" height="34" rx="10" fill="#e1fff6"/>
      <text x="627" y="129" text-anchor="middle" fill="#172034" font-size="27" font-weight="900">/</text>
      <text x="561" y="153" text-anchor="middle" fill="#172034" font-size="20" font-weight="900">24 @ 6 = 4</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="60" y="265" width="198" height="86" rx="16" fill="#fff0f4" stroke="#f95877" stroke-width="3"/>
      <text x="84" y="297" fill="#f95877" font-size="13" font-weight="900">ARROW R</text>
      <rect x="208" y="281" width="34" height="34" rx="10" fill="#ffe0e7"/>
      <text x="225" y="306" text-anchor="middle" fill="#172034" font-size="27" font-weight="900">-</text>
      <text x="159" y="330" text-anchor="middle" fill="#172034" font-size="20" font-weight="900">9 @ 3 = 27</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="462" y="265" width="198" height="86" rx="16" fill="#fff8e8" stroke="#ffd166" stroke-width="3"/>
      <text x="486" y="297" fill="#9a6a00" font-size="13" font-weight="900">ARROW S</text>
      <rect x="610" y="281" width="34" height="34" rx="10" fill="#fff0c9"/>
      <text x="627" y="306" text-anchor="middle" fill="#172034" font-size="25" font-weight="900">x</text>
      <text x="561" y="330" text-anchor="middle" fill="#172034" font-size="20" font-weight="900">18 @ 3 = 6</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="280" y="154" width="160" height="120" rx="22" fill="url(#centerBg)"/>
      <rect x="296" y="170" width="128" height="88" rx="16" fill="#ffffff" opacity="0.08"/>
      <text x="360" y="188" text-anchor="middle" fill="#bdefff" font-size="12" font-weight="900">CENTRE BOX</text>
      <text x="360" y="233" text-anchor="middle" fill="#ffffff" font-size="56" font-weight="900">@</text>
      <text x="360" y="255" text-anchor="middle" fill="#bdefff" font-size="12" font-weight="800">replace this sign</text>
    </g>

    <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="10" opacity="0.92">
      <path d="M258 132 C280 132 294 144 306 162"/>
      <path d="M462 132 C440 132 426 144 414 162"/>
      <path d="M258 308 C281 307 297 292 308 268"/>
      <path d="M462 308 C439 307 423 292 412 268"/>
    </g>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="5">
      <path d="M258 132 C280 132 294 144 306 162" stroke="#118ab2"/>
      <path d="M462 132 C440 132 426 144 414 162" stroke="#06d6a0"/>
      <path d="M258 308 C281 307 297 292 308 268" stroke="#f95877"/>
      <path d="M462 308 C439 307 423 292 412 268" stroke="#ffd166"/>
    </g>

    <path d="M312 169 L292 158 L300 182 Z" fill="#118ab2" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <path d="M408 169 L428 158 L420 182 Z" fill="#06d6a0" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <path d="M314 260 L292 270 L302 246 Z" fill="#f95877" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <path d="M406 260 L428 270 L418 246 Z" fill="#ffd166" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
  </g>
</svg>
